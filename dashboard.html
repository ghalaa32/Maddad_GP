<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدد | متابعة التقدم</title>

<link rel="stylesheet" href="style.css">

<style>

.dashboard-page{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.dashboard-card{
background:white;
border-radius:18px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.dashboard-title{
font-size:28px;
font-weight:700;
margin-bottom:10px;
text-align:center;
}

.dashboard-sub{
text-align:center;
color:#666;
margin-bottom:30px;
}

.progress-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.progress-box{
background:#f7f9fc;
padding:20px;
border-radius:14px;
text-align:center;
}

.progress-number{
font-size:32px;
font-weight:700;
margin-top:10px;
}

.progress-label{
font-size:14px;
color:#777;
}

.history-box{
margin-top:30px;
}

.history-title{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.history-item{
background:#f7f9fc;
padding:12px 16px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
}

.top-logo{
height:70px;
display:block;
margin:auto;
margin-bottom:20px;
}

.back-btn{
margin-top:25px;
}

</style>

</head>

<body class="bg-main" onload="loadDashboard()">

<div class="bg-blur bg-blur-top"></div>
<div class="bg-blur bg-blur-bottom"></div>

<div class="dashboard-page">

<img src="logo.png" class="top-logo">

<div class="dashboard-card">

<div class="dashboard-title">
متابعة تطور الطفل
</div>

<div class="dashboard-sub">
يمكنك متابعة تحسن أو تراجع المهارات عبر الوقت
</div>

<div class="progress-grid">

<div class="progress-box">
<div class="progress-label">آخر نتيجة</div>
<div id="latestScore" class="progress-number">--</div>
</div>

<div class="progress-box">
<div class="progress-label">مستوى الخطورة</div>
<div id="latestRisk" class="progress-number">--</div>
</div>

</div>

<div class="history-box">

<div class="history-title">
السجل السابق
</div>

<div id="historyList">

</div>

</div>

<button class="main-btn back-btn" onclick="goBackHome()">
العودة للرئيسية
</button>

</div>

</div>

<script>

function loadDashboard(){

const assessment = JSON.parse(localStorage.getItem("maddadAssessment"))

if(!assessment){
return
}

document.getElementById("latestScore").textContent = assessment.finalScore

document.getElementById("latestRisk").textContent =
assessment.finalRisk === "low" ? "منخفضة" :
assessment.finalRisk === "medium" ? "متوسطة" :
"مرتفعة"

let history = JSON.parse(localStorage.getItem("maddadHistory")) || []

const list = document.getElementById("historyList")

list.innerHTML=""

history.forEach(item => {

const div = document.createElement("div")

div.className="history-item"

div.innerHTML = `
<span>${item.date}</span>
<span>${item.risk}</span>
`

list.appendChild(div)

})

}

</script>

</body>
</html>
